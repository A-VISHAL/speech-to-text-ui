<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceScribe — AI Agent</title>
  <meta name="description" content="AI-powered agent with speech-to-text, image understanding, and vision capabilities." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Animated background blobs -->
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <!-- Header -->
  <header class="app-header glass">
    <div class="brand">
      <span class="brand-logo" aria-hidden="true">🎙️</span>
      <h1 class="brand-title">VoiceScribe</h1>
    </div>
    <button id="themeToggle" class="icon-btn" type="button" title="Toggle light / dark mode" aria-label="Toggle light or dark mode">
      <span class="theme-icon theme-icon--dark" aria-hidden="true">🌙</span>
      <span class="theme-icon theme-icon--light" aria-hidden="true">☀️</span>
    </button>
  </header>

  <!-- Chat messages area -->
  <main class="chat-main">
    <div id="chatMessages" class="chat-messages">
      <div class="chat-empty-state">
        <div class="empty-icon">💬</div>
        <h2>How can I help you today?</h2>
        <p>Send a message or attach images for the agent to analyze.</p>
      </div>
    </div>
  </main>

  <!-- Composer area (input + image previews + controls) -->
  <footer class="composer-wrapper">
    <!-- Drag & drop overlay -->
    <div id="dropOverlay" class="drop-overlay" hidden>
      <div class="drop-overlay-content">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>Drop images here</span>
      </div>
    </div>

    <!-- Image previews container -->
    <div id="imagePreviewContainer" class="image-preview-container" hidden>
      <div id="imagePreviews" class="image-previews"></div>
    </div>

    <!-- Chat composer -->
    <div class="composer glass" id="composer">
      <!-- Hidden file input -->
      <input type="file" id="fileInput" accept="image/png,image/jpeg,image/jpg,image/webp,image/gif,image/svg+xml" multiple hidden />

      <div class="composer-input-row">
        <!-- Attachment button -->
        <button id="attachBtn" class="composer-btn attach-btn" type="button" title="Attach images" aria-label="Attach images">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.49"/>
          </svg>
        </button>

        <!-- Text input -->
        <div id="chatInput" class="chat-input" contenteditable="true" role="textbox" aria-multiline="true" aria-label="Message input" data-placeholder="Describe a task, or @ a file..."></div>

        <!-- Mic buttons -->
        <button id="micBtn" class="composer-btn mic-btn-small" type="button" title="Voice input" aria-label="Voice input">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>

        <button id="micBtnAlt" class="composer-btn mic-btn-alt" type="button" title="Test Mic API" aria-label="Test Mic API">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3Z"/>
            <path d="M19 11a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.92V21a1 1 0 1 0 2 0v-3.08A7 7 0 0 0 19 11Z"/>
          </svg>
        </button>

        <!-- Send button -->
        <button id="sendBtn" class="composer-btn send-btn" type="button" title="Send message" aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Controls row below input -->
    <div class="composer-controls">
      <div class="controls-left">
        <div class="agent-selector">
          <span class="agent-dot"></span>
          <select id="agentSelect" class="control-select">
            <option value="agent">Agent</option>
            <option value="assistant">Assistant</option>
          </select>
        </div>
        <select id="modelSelect" class="control-select model-select">
          <option value="kimi-k2.6">Kimi K2.6</option>
          <option value="gpt-4-vision">GPT-4 Vision</option>
          <option value="claude-3.5-sonnet">Claude 3.5 Sonnet</option>
          <option value="gemini-pro-vision">Gemini Pro Vision</option>
        </select>
      </div>
      <div class="controls-right">
        <span class="brand-hint">oxlo.ai</span>
        <button id="testMicBtn" class="test-mic-btn" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          </svg>
          Test Mic API
        </button>
      </div>
    </div>
  </footer>

  <!-- Validation / error toast -->
  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <!-- Config (loaded before scripts) -->
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
